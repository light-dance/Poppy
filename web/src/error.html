<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>%sveltekit.error.message%</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			body {
				font-family:
					system-ui,
					-apple-system,
					BlinkMacSystemFont,
					'Segoe UI',
					Roboto,
					sans-serif;
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				background-color: #f5f5f5;
			}
			@media (prefers-color-scheme: dark) {
				body {
					background-color: #262626;
				}
				h1 {
					color: #fff;
				}
				h2 {
					color: #e5e5e5;
				}
			}
			.container {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 0.5rem;
				text-align: center;
				padding: 1rem;
			}
			h1 {
				font-size: 2.25rem;
				font-weight: 500;
				color: #171717;
			}
			h2 {
				font-size: 1.125rem;
				font-weight: 400;
				color: #404040;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<h1>%sveltekit.status%</h1>
			<h2>%sveltekit.error.message%</h2>
		</div>
	</body>
</html>
