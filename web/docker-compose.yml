name: ${RAILWAY_PROJECT_NAME}

services:
  db:
    image: postgres
    restart: always
    ports:
      - 5432
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: local
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - 6379
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
