name: Release

on:
    workflow_dispatch:
        inputs:
            version:
                description: Marketing version, for example 1.0.1
                required: false
                type: string
            build_number:
                description: Build number
                required: false
                type: string

jobs:
    release:
        name: Build, Sign, Notarize, and Package
        runs-on: blacksmith-6vcpu-macos-26
        permissions:
            contents: read
        steps:
            - name: Check out repository
              uses: actions/checkout@v6

            - name: Show Xcode version
              run: xcodebuild -version

            - name: Import Developer ID certificate
              env:
                  CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
                  CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
                  KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
              run: |
                  set -euo pipefail

                  CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
                  KEYCHAIN_PATH="$RUNNER_TEMP/poppy-signing.keychain-db"

                  echo "$CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
                  security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
                  security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
                  security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
                  security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
                  security list-keychains -d user -s "$KEYCHAIN_PATH"
                  security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

            - name: Write App Store Connect API key
              env:
                  APP_STORE_CONNECT_API_KEY_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8_BASE64 }}
                  APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
              run: |
                  set -euo pipefail

                  mkdir -p "$RUNNER_TEMP/private_keys"
                  echo "$APP_STORE_CONNECT_API_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8"

            - name: Build release artifacts
              env:
                  APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
                  APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
                  APP_STORE_CONNECT_API_KEY_PATH: ${{ runner.temp }}/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8
                  CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
                  POPPY_VERSION: ${{ inputs.version }}
                  POPPY_BUILD_NUMBER: ${{ inputs.build_number }}
              run: |
                  args=()
                  if [[ -n "${POPPY_VERSION:-}" ]]; then
                    args+=(--version "$POPPY_VERSION")
                  fi
                  if [[ -n "${POPPY_BUILD_NUMBER:-}" ]]; then
                    args+=(--build-number "$POPPY_BUILD_NUMBER")
                  fi

                  app/scripts/release.sh "${args[@]}"

            - name: Upload app ZIP
              uses: actions/upload-artifact@v7
              with:
                  name: poppy-app-zip
                  path: app/dist/*.zip
                  if-no-files-found: error

            - name: Upload DMG
              uses: actions/upload-artifact@v7
              with:
                  name: poppy-dmg
                  path: app/dist/*.dmg
                  if-no-files-found: error

    upload-to-railway:
        name: Upload to Railway Bucket
        runs-on: blacksmith-2vcpu-ubuntu-2404
        needs: release
        permissions:
            contents: read
        steps:
            - name: Check out repository
              uses: actions/checkout@v6

            - name: Set up Bun
              uses: oven-sh/setup-bun@v2

            - name: Download app ZIP artifact
              uses: actions/download-artifact@v7
              with:
                  name: poppy-app-zip
                  path: release-files

            - name: Download DMG artifact
              uses: actions/download-artifact@v7
              with:
                  name: poppy-dmg
                  path: release-files

            - name: Upload release files to Railway bucket
              env:
                  RAILWAY_BUCKET_ENDPOINT: ${{ secrets.RAILWAY_BUCKET_ENDPOINT }}
                  RAILWAY_BUCKET_NAME: ${{ secrets.RAILWAY_BUCKET_NAME }}
                  RAILWAY_BUCKET_ACCESS_KEY_ID: ${{ secrets.RAILWAY_BUCKET_ACCESS_KEY_ID }}
                  RAILWAY_BUCKET_SECRET_ACCESS_KEY: ${{ secrets.RAILWAY_BUCKET_SECRET_ACCESS_KEY }}
                  RAILWAY_BUCKET_REGION: ${{ vars.RAILWAY_BUCKET_REGION }}
                  POPPY_VERSION: ${{ inputs.version }}
              run: |
                  prefix="releases"
                  if [[ -n "${POPPY_VERSION:-}" ]]; then
                    prefix="releases/$POPPY_VERSION"
                  fi

                  bun app/scripts/upload_railway_bucket.ts \
                    --prefix "$prefix" \
                    release-files/*.zip \
                    release-files/*.dmg
