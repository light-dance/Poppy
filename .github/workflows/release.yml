name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release metadata version, for example 0.1.0. Defaults to the latest app/releases/*.json file.
        required: false
        type: string

jobs:
  release:
    name: Build, Sign, Notarize, and Package
    runs-on: blacksmith-6vcpu-macos-26
    environment: Release
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/poppy-signing.keychain-db"

          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Write App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8_BASE64 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/private_keys"
          echo "$APP_STORE_CONNECT_API_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8"

      - name: Build release artifacts
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_PATH: ${{ runner.temp }}/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8
          CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          POPPY_INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          latest_release_version() {
            find app/releases -maxdepth 1 -name "*.json" -print \
              | sed -e 's#^app/releases/##' -e 's#\.json$##' \
              | awk '/^[0-9]+\.[0-9]+\.[0-9]+$/' \
              | sort -t. -k1,1n -k2,2n -k3,3n \
              | tail -n 1
          }

          POPPY_VERSION="${POPPY_INPUT_VERSION:-}"
          if [[ -z "$POPPY_VERSION" && "$GITHUB_REF_TYPE" == "tag" ]]; then
            POPPY_VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [[ -z "$POPPY_VERSION" ]]; then
            POPPY_VERSION="$(latest_release_version)"
          fi
          if [[ -z "$POPPY_VERSION" ]]; then
            echo "Missing release version. Add app/releases/<version>.json or pass workflow input version." >&2
            exit 1
          fi

          metadata_path="app/releases/$POPPY_VERSION.json"
          if [[ ! -f "$metadata_path" ]]; then
            echo "Missing release metadata file: $metadata_path" >&2
            echo "Release runs must commit app/releases/<version>.json with version, build_number, title, and changelog." >&2
            exit 1
          fi

          metadata_version="$(plutil -extract version raw "$metadata_path")"
          if [[ "$metadata_version" != "$POPPY_VERSION" ]]; then
            echo "Release metadata version ($metadata_version) does not match resolved version ($POPPY_VERSION)." >&2
            exit 1
          fi

          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" != "v$POPPY_VERSION" ]]; then
            echo "Tag name ($GITHUB_REF_NAME) does not match release metadata version ($POPPY_VERSION)." >&2
            exit 1
          fi

          POPPY_BUILD_NUMBER="$(plutil -extract build_number raw "$metadata_path")"
          app/scripts/release.sh --version "$POPPY_VERSION" --build-number "$POPPY_BUILD_NUMBER"

      - name: Sign Sparkle update ZIP
        env:
          POPPY_SPARKLE_PRIVATE_KEY: ${{ secrets.POPPY_SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          SPARKLE_VERSION="2.9.2"
          SPARKLE_SHA256="1cb340cbbef04c6c0d162078610c25e2221031d794a3449d89f2f56f4df77c95"
          SPARKLE_ARCHIVE="$RUNNER_TEMP/Sparkle-$SPARKLE_VERSION.tar.xz"
          SPARKLE_DIR="$RUNNER_TEMP/Sparkle-$SPARKLE_VERSION"

          if [[ -z "$POPPY_SPARKLE_PRIVATE_KEY" ]]; then
            echo "Missing POPPY_SPARKLE_PRIVATE_KEY secret." >&2
            exit 1
          fi

          curl -L \
            -o "$SPARKLE_ARCHIVE" \
            "https://github.com/sparkle-project/Sparkle/releases/download/$SPARKLE_VERSION/Sparkle-$SPARKLE_VERSION.tar.xz"

          actual_sha256="$(shasum -a 256 "$SPARKLE_ARCHIVE" | awk '{print $1}')"
          if [[ "$actual_sha256" != "$SPARKLE_SHA256" ]]; then
            echo "Sparkle archive checksum mismatch: expected $SPARKLE_SHA256, got $actual_sha256" >&2
            exit 1
          fi

          mkdir -p "$SPARKLE_DIR"
          tar -xf "$SPARKLE_ARCHIVE" -C "$SPARKLE_DIR"

          zip_count="$(find app/dist -maxdepth 1 -name "Poppy-*.zip" -print | wc -l | tr -d ' ')"
          if [[ "$zip_count" != "1" ]]; then
            echo "Expected exactly one Poppy ZIP in app/dist, found $zip_count" >&2
            find app/dist -maxdepth 1 -name "Poppy-*.zip" -print >&2
            exit 1
          fi

          zip_path="$(find app/dist -maxdepth 1 -name "Poppy-*.zip" -print -quit)"
          zip_length="$(stat -f "%z" "$zip_path")"
          zip_signature="$(printf '%s' "$POPPY_SPARKLE_PRIVATE_KEY" | "$SPARKLE_DIR/bin/sign_update" --ed-key-file - -p "$zip_path" | tr -d '\r\n')"

          if [[ -z "$zip_signature" ]]; then
            echo "Sparkle signing did not return a ZIP signature." >&2
            exit 1
          fi

          mkdir -p app/build/release/sparkle
          SPARKLE_ZIP_LENGTH="$zip_length" \
          SPARKLE_ZIP_SIGNATURE="$zip_signature" \
            python3 - <<'PY'
          import json
          import os

          with open("app/build/release/sparkle/sparkle-release.json", "w", encoding="utf-8") as file:
              json.dump(
                  {
                      "sparkleZipLength": int(os.environ["SPARKLE_ZIP_LENGTH"]),
                      "sparkleZipSignature": os.environ["SPARKLE_ZIP_SIGNATURE"],
                  },
                  file,
                  indent=2,
              )
              file.write("\n")
          PY

      - name: Upload app ZIP
        uses: actions/upload-artifact@v7
        with:
          name: poppy-app-zip
          path: app/dist/*.zip
          if-no-files-found: error

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: poppy-dmg
          path: app/dist/*.dmg
          if-no-files-found: error

      - name: Upload Sparkle metadata
        uses: actions/upload-artifact@v7
        with:
          name: poppy-sparkle-metadata
          path: app/build/release/sparkle/sparkle-release.json
          if-no-files-found: error

  publish-to-web:
    name: Publish to Web
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: release
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Download app ZIP artifact
        uses: actions/download-artifact@v7
        with:
          name: poppy-app-zip
          path: release-files

      - name: Download DMG artifact
        uses: actions/download-artifact@v7
        with:
          name: poppy-dmg
          path: release-files

      - name: Download Sparkle metadata artifact
        uses: actions/download-artifact@v7
        with:
          name: poppy-sparkle-metadata
          path: release-metadata

      - name: Upload release files to web bucket
        env:
          RAILWAY_BUCKET_ENDPOINT: ${{ secrets.RAILWAY_BUCKET_ENDPOINT }}
          RAILWAY_BUCKET_NAME: ${{ secrets.RAILWAY_BUCKET_NAME }}
          RAILWAY_BUCKET_ACCESS_KEY_ID: ${{ secrets.RAILWAY_BUCKET_ACCESS_KEY_ID }}
          RAILWAY_BUCKET_SECRET_ACCESS_KEY: ${{ secrets.RAILWAY_BUCKET_SECRET_ACCESS_KEY }}
          RAILWAY_BUCKET_REGION: ${{ vars.RAILWAY_BUCKET_REGION }}
          POPPY_INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          latest_release_version() {
            find app/releases -maxdepth 1 -name "*.json" -print \
              | sed -e 's#^app/releases/##' -e 's#\.json$##' \
              | awk '/^[0-9]+\.[0-9]+\.[0-9]+$/' \
              | sort -t. -k1,1n -k2,2n -k3,3n \
              | tail -n 1
          }

          POPPY_VERSION="${POPPY_INPUT_VERSION:-}"
          if [[ -z "$POPPY_VERSION" && "$GITHUB_REF_TYPE" == "tag" ]]; then
            POPPY_VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [[ -z "$POPPY_VERSION" ]]; then
            POPPY_VERSION="$(latest_release_version)"
          fi
          if [[ -z "$POPPY_VERSION" ]]; then
            echo "Missing release version. Add app/releases/<version>.json or pass workflow input version." >&2
            exit 1
          fi
          if [[ ! -f "app/releases/$POPPY_VERSION.json" ]]; then
            echo "Missing release metadata file: app/releases/$POPPY_VERSION.json" >&2
            exit 1
          fi
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" != "v$POPPY_VERSION" ]]; then
            echo "Tag name ($GITHUB_REF_NAME) does not match release metadata version ($POPPY_VERSION)." >&2
            exit 1
          fi

          prefix="releases/$POPPY_VERSION"

          bun app/scripts/upload_railway_bucket.ts \
            --prefix "$prefix" \
            release-files/*.zip \
            release-files/*.dmg

      - name: Publish release metadata to web
        env:
          POPPY_RELEASE_API_URL: ${{ secrets.POPPY_RELEASE_API_URL }}
          POPPY_RELEASE_API_TOKEN: ${{ secrets.POPPY_RELEASE_API_TOKEN }}
          POPPY_INPUT_VERSION: ${{ inputs.version }}
          POPPY_SPARKLE_METADATA_PATH: release-metadata/sparkle-release.json
        run: bun app/scripts/publish_web_release.ts
